<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Complaint | Yashni Creations</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #133D35;
            --gold: #C5A059;
            --white: #ffffff;
            --cream: #FCF9F2;
        }

        body { 
            background: var(--green); 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png'); /* Indian Fabric Texture */
        }

        /* --- SHINING LOGO STYLES (Same as Index) --- */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 20px; /* Box se thoda upar */
            background: white;
            padding: 10px;
            border: 2px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .logo-wrapper img {
            height: 80px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* Shine Animation Effect */
        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: 0; 
            left: -150%;
            width: 50%; 
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shine-sweep 4s infinite;
        }

        @keyframes shine-sweep {
            0% { left: -150%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* --- COMPLAINT BOX --- */
        .box { 
            background: white; 
            color: var(--green); 
            padding: 40px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 500px; 
            border: 4px solid var(--gold); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); 
            text-align: center;
        }

        .brand-name-small {
            font-family: 'Great Vibes', cursive;
            font-size: 30px;
            color: var(--green);
            margin-bottom: 10px;
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            margin-bottom: 25px; 
            font-size: 24px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            outline: none; 
            font-family: inherit; 
            background: var(--cream);
        }

        textarea { height: 100px; resize: none; }
        
        button { 
            width: 100%; 
            background: var(--green); 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        button:hover { background: var(--gold); transform: translateY(-2px); }

        .back { 
            margin-top: 25px; 
            display: inline-block; 
            color: white; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600; 
            letter-spacing: 1px;
            border-bottom: 1px solid white;
            padding-bottom: 2px;
        }
        .back:hover { color: var(--gold); border-color: var(--gold); }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <img src="Untitled.jpg" alt="Yashni Creations Logo">
    </div>

    <div class="box">
        <div class="brand-name-small">Yashni Creations</div>
        <h2>Register Complaint</h2>
        
        <form action="https://formspree.io/f/ishaniahuja.123@gmail.com" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="Aapka Naam">
            </div>
            <div class="form-group">
                <label>Order ID (Optional)</label>
                <input type="text" name="order_id" placeholder="Ex: #YC1234">
            </div>
            <div class="form-group">
                <label>Complaint Details</label>
                <textarea name="message" required placeholder="Apni dikkat yahan likhein..."></textarea>
            </div>
            <button type="submit">Send Complaint</button>
        </form>
    </div>

    <a href="index.html" class="back">← Back to Collections</a>

</body>
</html>
