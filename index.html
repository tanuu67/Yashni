<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yashni Creations | Exclusive Luxury Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>

    <style>
        :root { 
            --green: #0a241e; /* Deep, richer luxury green */
            --gold: #D4AF37;  /* Classic pure gold */
            --white: #ffffff; 
            --cream: #FAF7F2; 
            --light-grey: #f9f9f9;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* LUXURY SCROLLBAR */
        @media (min-width: 900px) {
            ::-webkit-scrollbar { width: 4px; }
            ::-webkit-scrollbar-track { background: var(--cream); }
            ::-webkit-scrollbar-thumb { background: var(--gold); }
        }

        body { 
            background-color: var(--cream); /* Softer base color */
            color: var(--green); 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--cream); z-index: 100000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
        }
        .preloader-brand { animation: pulseGlow 2.5s infinite alternate ease-in-out; text-align: center; }
        
        /* The Magic: Removing white background from the logo */
        .preloader-brand img { 
            height: 120px; width: auto; object-fit: contain; 
            mix-blend-mode: multiply; /* Removes white background */
            filter: contrast(1.1) brightness(0.9); /* Enhances logo colors */
        }
        
        .preloader-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--green); letter-spacing: 4px; margin-top: 20px; text-transform: uppercase; font-weight: 400;}
        
        @keyframes pulseGlow {
            0% { transform: scale(0.98); opacity: 0.9; }
            100% { transform: scale(1.02); opacity: 1; }
        }

        .site-content { opacity: 0; transform: translateY(15px); transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), transform 1.2s cubic-bezier(0.25, 1, 0.5, 1); }
        .site-content.loaded { opacity: 1; transform: translateY(0); }

        /* --- HEADER --- */
        header {
            background: var(--white); /* Clean white header */
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.3); /* Subtle gold border */
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            transition: 0.3s;
        }
        header .nav-links { display: flex; gap: 30px; flex: 1; align-items: center;}
        header .nav-links.right { justify-content: flex-end; }
        header a { text-decoration: none; color: var(--green); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; transition: color 0.3s ease;}
        header a:hover { color: var(--gold); }

        header .header-wa-btn { border: 1px solid var(--green); padding: 8px 20px; border-radius: 0px; font-size: 10px; letter-spacing: 2px;}
        header .header-wa-btn:hover { background: var(--green); color: white !important; }

        /* ORIGINAL LOGO IN HEADER (White Background Kept) */
        .center-brand { text-align: center; flex: 1; display: flex; justify-content: center; align-items: center; }
        .logo-wrapper { position: relative; display: inline-block; overflow: hidden; padding: 2px 10px; }
        .logo-img { height: 50px; width: auto; display: block; object-fit: contain; }

        /* --- MASONRY GRID --- */
        .lookbook-container { max-width: 1400px; margin: 60px auto; padding: 0 20px; column-count: 4; column-gap: 20px; transition: column-count 0.4s; }
        
        .card { 
            break-inside: avoid; margin-bottom: 20px; position: relative; 
            border-radius: 0px; /* Sharp edges for luxury look */
            overflow: hidden; background: var(--white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        
        .img-box { position: relative; overflow: hidden; display: block; width: 100%; }
        .img-box img { width: 100%; display: block; transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); filter: brightness(0.95);}
        .card:hover img { transform: scale(1.04); filter: brightness(1); }

        .wishlist-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.8); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; color: #999; z-index: 2; transition: 0.3s ease; backdrop-filter: blur(5px);}
        .wishlist-btn:hover { color: var(--gold); background: white; transform: scale(1.05); }
        
        /* LUXURY CARD OVERLAY */
        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 20px 20px;
            background: linear-gradient(to top, rgba(10, 36, 30, 0.9) 0%, rgba(10, 36, 30, 0.4) 70%, transparent 100%);
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; 
            opacity: 0; transition: opacity 0.6s ease;
        }
        @media (hover: hover) { .card:hover .card-overlay { opacity: 1; } }
        @media (hover: none) { .card-overlay { opacity: 1; background: linear-gradient(to top, rgba(10, 36, 30, 0.95) 0%, rgba(10, 36, 30, 0.6) 60%, transparent 100%); } }
        
        .product-title { color: var(--white); font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic; font-weight: 400; letter-spacing: 1px;}
        
        .product-desc { 
            color: rgba(255, 255, 255, 0.7); font-size: 10px; line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-transform: uppercase; letter-spacing: 2px;
        }

        .price-tag { color: var(--gold); font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 14px; letter-spacing: 1.5px; margin-top: 5px;}
        
        .buy-now { 
            background: transparent; color: var(--white); padding: 8px 25px; border: 1px solid var(--gold); 
            font-size: 9px; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; margin-top: 10px; transition: 0.3s ease;
        }
        .buy-now:hover { background: var(--gold); color: var(--green); }

        /* --- FOOTER --- */
        footer { 
            background: var(--green); color: var(--white); padding: 80px 20px 40px; text-align: center; border-top: 1px solid var(--gold); margin-top: 80px;
        }
        footer h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 20px; color: var(--gold); letter-spacing: 3px; font-weight: 400;}
        .contact-details p { font-size: 12px; margin-bottom: 12px; font-weight: 300; color: #ccc; letter-spacing: 1px;}
        
        .social-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        .social-btn { color: var(--white); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; transition: color 0.3s ease; padding-bottom: 2px; border-bottom: 1px solid transparent;}
        .social-btn:hover { color: var(--gold); border-bottom-color: var(--gold); }

        .developer-credit { margin-top: 60px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 9px; color: #888; letter-spacing: 3px; text-transform: uppercase; }
        .developer-credit a { color: var(--gold); text-decoration: none; transition: 0.3s;}
        .developer-credit a:hover { color: var(--white); }

        /* --- FLOATING WHATSAPP --- */
        .floating-wa { position: fixed; bottom: 30px; left: 30px; z-index: 9999; background: #25D366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; text-decoration: none; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3); transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); }
        .floating-wa:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(37, 211, 102, 0.4); }

        /* MOBILE RESPONSIVE */
        @media (max-width: 1200px) { .lookbook-container { column-count: 3; } }
        @media (max-width: 900px) { .lookbook-container { column-count: 2; } }
        @media (max-width: 600px) { 
            .lookbook-container { column-count: 2; column-gap: 10px; padding: 0 10px; margin: 30px auto;}
            .card { margin-bottom: 10px; }
            header { padding: 15px 10px; } .nav-links { gap: 15px; } header a { font-size: 9px; }
            header .header-wa-btn { padding: 6px 12px; font-size: 8px; } .logo-img { height: 40px; }
            .floating-wa { width: 45px; height: 45px; font-size: 22px; bottom: 20px; left: 20px; }
            .card-overlay { padding: 20px 10px 15px; gap: 5px;}
            .product-title { font-size: 15px; } .product-desc { display: none; } /* Hide desc on mobile for clean look */
            .price-tag { font-size: 12px; margin-top: 0;} .buy-now { padding: 5px 12px; font-size: 8px; margin-top: 5px;} .wishlist-btn { width: 28px; height: 28px; font-size: 12px; top: 10px; right: 10px;}
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="preloader-brand">
            <img src="Untitled.jpg" alt="Yashni Creations">
            <div class="preloader-text">Yashni Creations</div>
        </div>
    </div>

    <div class="site-content" id="mainSite">
        
        <header id="main-header">
            <div class="nav-links">
                <a href="#">Shop</a>
                <a href="#">New In</a>
            </div>
            
            <div class="center-brand">
                <div class="logo-wrapper">
                    <img src="Untitled.jpg" class="logo-img" alt="Yashni Creations">
                </div>
            </div>
            
            <div class="nav-links right">
                <a href="complaint.html">Support</a>
                <a href="https://wa.me/919779997768" class="header-wa-btn" target="_blank">Contact</a>
            </div>
        </header>

        <div class="lookbook-container" id="grid">
            <p style="text-align: center; width: 100%; color: var(--gold); padding: 100px 0; font-family: 'Playfair Display', serif; font-size: 20px; letter-spacing: 2px;">Curating Elegance...</p>
        </div>

        <footer id="contact-footer">
            <h2>Yashni Creations</h2>
            <div class="contact-details">
                <p>ishaniahuja.123@gmail.com</p>
                <p>+91 97799 97768 &nbsp;|&nbsp; +91 78890 71347</p>
            </div>
            <div class="social-buttons">
                <a href="https://wa.me/919779997768" class="social-btn" target="_blank">WhatsApp</a>
                <a href="#" class="social-btn" target="_blank">Instagram</a>
            </div>
            
            <div class="developer-credit">
                Designed By <a href="https://skywebsolutions.in/" target="_blank">SkyWeb Solutions</a>
            </div>
        </footer>

        <a href="https://wa.me/919779997768" class="floating-wa" target="_blank">💬</a>
    </div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // PRELOADER
    window.addEventListener('load', function() {
        setTimeout(function() {
            var preloader = document.getElementById('preloader');
            var mainSite = document.getElementById('mainSite');
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            document.body.style.overflow = 'auto';
            mainSite.classList.add('loaded');
        }, 2000); // Slightly longer for a grand entrance
    });

    // CONTENTFUL
    const SPACE_ID = 'l2ejwf7j6w9f'; 
    const ACCESS_TOKEN = 'Etivt-wjn21NJojQbh8TOPUBKbcNlwIEhgINXHQQLdE';

    const client = contentful.createClient({ space: SPACE_ID, accessToken: ACCESS_TOKEN });

    client.getEntries({ content_type: 'product' }) 
        .then((response) => {
            const products = response.items;
            const grid = document.getElementById('grid');

            grid.innerHTML = products.map((prod, index) => {
                const title = prod.fields.title || 'Exclusive Collection'; 
                const desc = prod.fields.description || ''; 
                const price = prod.fields.price || '';
                const buyLink = prod.fields.buyLink || '#';
                
                let imageUrl = 'https://placehold.co/400x600/FAF7F2/0a241e?text=Yashni';
                if(prod.fields.image && prod.fields.image.fields.file) {
                    imageUrl = 'https:' + prod.fields.image.fields.file.url;
                }

                const descHtml = desc ? `<div class="product-desc">${desc}</div>` : '';

                return `
                <div class="card" data-aos="fade-up" data-aos-offset="50" data-aos-delay="${(index % 4) * 100}">
                    <div class="wishlist-btn">❤</div>
                    <div class="img-box">
                        <img src="${imageUrl}" alt="${title}" loading="lazy">
                    </div>
                    <div class="card-overlay">
                        <div class="product-title">${title}</div>
                        ${descHtml}
                        <div class="price-tag">${price}</div>
                        <a href="${buyLink}" target="_blank" class="buy-now">Discover</a>
                    </div>
                </div>
                `;
            }).join('');

            AOS.init({ once: true, offset: 50, easing: 'ease-out-quart', duration: 1000 });
        })
        .catch(console.error);
</script>
</body>
</html>
