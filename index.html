<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yashni Creations | Ultra-Premium Luxury Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root { 
            --green: #133D35; 
            --gold: #C5A059; 
            --white: #ffffff; 
            --cream: #FCF9F2; 
            --light-grey: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* LUXURY CUSTOM SCROLLBAR (Desktop Only) */
        @media (min-width: 900px) {
            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-track { background: var(--cream); }
            ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--green); }
        }

        @keyframes softReveal {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        body { 
            background-color: var(--white); 
            color: var(--green); 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            animation: softReveal 1.2s ease-out;
        }

        /* Custom Cursor for Desktop */
        @media (hover: hover) and (pointer: fine) {
            body { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"><circle cx="8" cy="8" r="4" fill="%23C5A059"/></svg>'), auto; }
            a, button, .card, .wishlist-btn { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"><circle cx="12" cy="12" r="10" fill="none" stroke="%23133D35" stroke-width="2"/></svg>'), pointer !important; }
        }

        /* --- STICKY HEADER --- */
        header {
            background: var(--green); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .nav-links { display: flex; gap: 20px; flex: 1; align-items: center;}
        .nav-links.right { justify-content: flex-end; }
        header a { text-decoration: none; color: var(--white); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;}
        header a:hover { color: var(--gold); }

        .header-wa-btn { background: #25D366; color: white !important; padding: 8px 15px; border-radius: 20px; font-size: 11px; }
        .header-wa-btn:hover { background: #128C7E; color: white !important; }

        /* CENTER SHINING LOGO */
        .center-brand { text-align: center; flex: 1; display: flex; justify-content: center; align-items: center; }
        .logo-wrapper { position: relative; display: inline-block; overflow: hidden; border-radius: 4px; background: white; padding: 2px 10px; }
        .logo-img { height: 60px; width: auto; object-fit: contain; display: block; }
        
        .logo-wrapper::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shine-sweep 4s infinite;
        }
        @keyframes shine-sweep { 0% { left: -150%; } 20% { left: 200%; } 100% { left: 200%; } }

        /* --- SEAMLESS MASONRY COLLAGE GRID --- */
        .lookbook-container { max-width: 1600px; margin: 20px auto; padding: 0 15px; column-count: 5; column-gap: 15px; }
        
        .card { 
            break-inside: avoid; margin-bottom: 15px; position: relative; 
            border-radius: 4px; overflow: hidden; background: var(--light-grey);
            border: 1px solid rgba(197, 160, 89, 0.1);
        }
        
        .img-box { position: relative; overflow: hidden; display: block; width: 100%; }
        .img-box img { width: 100%; display: block; transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1); }
        .card:hover img { transform: scale(1.05); }
        
        /* GLASSMORPHISM OVERLAY */
        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 15px 15px;
            background: rgba(19, 61, 53, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; justify-content: space-between; align-items: flex-end;
            opacity: 0; transition: opacity 0.5s ease; border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Hover for Desktop */
        @media (hover: hover) { .card:hover .card-overlay { opacity: 1; } }
        
        /* ALWAYS SHOW OVERLAY ON MOBILE (Touch Devices) */
        @media (hover: none) {
            .card-overlay { 
                opacity: 1; padding: 20px 10px 10px; 
                background: linear-gradient(to top, rgba(19, 61, 53, 0.85) 0%, transparent 100%);
                backdrop-filter: none; /* Better performance on phones */
            }
        }
        
        .price-tag { color: var(--gold); font-weight: 700; font-size: 17px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);}
        .buy-now { background: var(--gold); color: var(--white); padding: 6px 18px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
        
        .wishlist-btn {
            position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9);
            width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 16px; color: #ccc; z-index: 2; transition: 0.3s;
        }
        .wishlist-btn:hover { color: #ff4757; transform: scale(1.1); }

        /* --- FOOTER --- */
        footer { 
            background: var(--green); color: var(--white); padding: 60px 20px; text-align: center; border-top: 4px solid var(--gold); margin-top: 40px;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
        }
        footer h2 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 20px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; }
        .contact-details p { font-size: 15px; margin-bottom: 10px; font-weight: 500; color: #EEE; }
        
        .social-buttons { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 30px; }
        .social-btn { padding: 12px 25px; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 12px; border-radius: 30px; transition: 0.3s; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .whatsapp { background: #25D366; color: white; border: 2px solid transparent; }
        .whatsapp:hover { background: white; color: #25D366; border-color: #25D366; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; border: 2px solid transparent; }

        /* --- FLOATING WHATSAPP & CHATBOT --- */
        .floating-wa {
            position: fixed; bottom: 30px; left: 30px; z-index: 9999;
            background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 30px; text-decoration: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); border: 2px solid white; transition: 0.3s ease-out;
        }
        .floating-wa:hover { transform: scale(1.1) translateY(-2px); }

        .chatbot-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .chat-btn {
            width: 60px; height: 60px; border-radius: 50%; background: var(--gold); color: var(--green);
            display: flex; align-items: center; justify-content: center; font-size: 26px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); border: 2px solid var(--white); transition: 0.3s; cursor: pointer;
        }
        .chat-btn:hover { transform: scale(1.1) translateY(-2px); }
        
        .chat-window {
            position: absolute; bottom: 80px; right: 0; width: 320px; background: white; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 1px solid #eee; display: none; flex-direction: column; overflow: hidden; transform-origin: bottom right;
        }
        .chat-window.active { display: flex; animation: chatPopUp 0.3s ease-out forwards; }
        @keyframes chatPopUp { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .chat-header { background: var(--green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-family: 'Playfair Display', serif;}
        .close-chat { font-family: sans-serif; font-size: 18px; color: rgba(255,255,255,0.7); cursor: pointer;}
        .chat-body { padding: 20px; height: 280px; overflow-y: auto; background: var(--cream); font-size: 13px; color: #444; }
        .bot-msg { background: white; padding: 12px; border-radius: 8px; border-bottom-left-radius: 0; margin-bottom: 12px; box-shadow: 0 3px 7px rgba(0,0,0,0.05); }
        .chat-input { display: flex; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; padding: 15px; border: none; outline: none; color: var(--green); font-family: inherit; }
        .chat-input button { padding: 0 20px; background: white; color: var(--gold); border: none; font-weight: bold; text-transform: uppercase; font-size: 13px; cursor: pointer;}

        /* --- 📱 MOBILE OPTIMIZATIONS (The Magic Happens Here) --- */
        @media (max-width: 1200px) { .lookbook-container { column-count: 4; } }
        @media (max-width: 900px) { .lookbook-container { column-count: 3; } }
        @media (max-width: 600px) { 
            /* Grid adjustments for phone */
            .lookbook-container { column-count: 2; column-gap: 8px; padding: 0 8px; margin: 15px auto;}
            .card { margin-bottom: 8px; border-radius: 4px;}
            
            /* Header compression */
            header { padding: 10px; }
            .nav-links { gap: 10px; }
            header a { font-size: 10px; margin-left: 0;}
            .header-wa-btn { padding: 6px 10px; font-size: 9px; }
            .logo-img { height: 45px; }
            .logo-wrapper { padding: 2px 5px; }
            
            /* Floating buttons resizing for thumbs */
            .floating-wa { width: 50px; height: 50px; font-size: 24px; bottom: 15px; left: 15px; }
            .chatbot-container { bottom: 15px; right: 15px; }
            .chat-btn { width: 50px; height: 50px; font-size: 20px; }
            .chat-window { width: calc(100vw - 30px); right: 0; bottom: 65px; }
            
            /* Card Overlay details for small screens */
            .price-tag { font-size: 14px; }
            .buy-now { padding: 4px 10px; font-size: 9px; }
            .wishlist-btn { width: 25px; height: 25px; font-size: 12px; }
            
            /* Footer text size */
            footer { padding: 40px 15px; }
            footer h2 { font-size: 22px; }
        }
        
        /* For very small phones (like older iPhones) */
        @media (max-width: 360px) {
            .nav-links a { display: none; } /* Hide extra links to save space */
            .nav-links.right a { display: inline-block; }
            .lookbook-container { column-count: 1; } /* Switch to 1 column for full detail */
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="nav-links">
            <a href="#">Shop</a>
            <a href="#">New</a>
        </div>
        
        <div class="center-brand">
            <div class="logo-wrapper">
                <img src="Untitled.jpg" class="logo-img" alt="Yashni Creations Logo">
            </div>
        </div>
        
        <div class="nav-links right">
            <a href="complaint.html" style="color: #ff4757; font-weight: 600;">Support</a>
            <a href="https://wa.me/919779997768" class="header-wa-btn" target="_blank">WhatsApp</a>
        </div>
    </header>

    <div class="lookbook-container" id="grid"></div>

    <footer id="contact-footer">
        <h2>Yashni Creations</h2>
        <div class="contact-details">
            <p><strong>Email:</strong> ishaniahuja.123@gmail.com</p>
            <p><strong>Call / Message:</strong> +91 97799 97768 &nbsp;|&nbsp; +91 78890 71347</p>
        </div>
        <div class="social-buttons">
            <a href="https://wa.me/919779997768" class="social-btn whatsapp" target="_blank">WhatsApp Group</a>
            <a href="#" class="social-btn instagram" target="_blank">Instagram</a>
        </div>
    </footer>

    <a href="https://wa.me/919779997768" class="floating-wa" target="_blank" title="Join WhatsApp Group">💬</a>

    <div class="chatbot-container">
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <span>✨ Yashni Assistant</span>
                <span class="close-chat" onclick="toggleChat()">✖</span>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="bot-msg">Namaste! Welcome to Yashni Creations. 🙏</div>
                <div class="bot-msg">How can I help you find the perfect outfit today?</div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Message..." id="chatInput">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
        <div class="chat-btn" onclick="toggleChat()">🤖</div>
    </div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ once: true, offset: 50, easing: 'ease-out-cubic', duration: 800 });
    
    // Varying Heights for Masonry Grid
    const heights = [600, 450, 500, 700, 400, 550, 620, 480, 680, 520, 460, 580, 640, 430, 510];
    const prices = ["₹4,599", "₹2,899", "₹3,849", "₹6,499", "₹1,899", "₹5,200", "₹2,500", "₹3,100"];
    
    document.getElementById('grid').innerHTML = heights.map((h, index) => {
        const randomPrice = prices[Math.floor(Math.random() * prices.length)];
        return `
        <div class="card" data-aos="fade-up" data-aos-offset="30">
            <div class="wishlist-btn">❤</div>
            <div class="img-box">
                <img src="https://placehold.co/400x${h}/FCF9F2/133D35?text=Yashni+Style+${index+1}" alt="Indian Wear">
            </div>
            <div class="card-overlay">
                <span class="price-tag">${randomPrice}</span>
                <span class="buy-now">Buy</span>
            </div>
        </div>
    `}).join('');

    function toggleChat() { document.getElementById('chatWindow').classList.toggle('active'); }
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if(!msg) return;
        const body = document.getElementById('chatBody');
        body.innerHTML += `<div class="bot-msg" style="background: var(--gold); color: white; text-align: right; margin-left: 20px;">${msg}</div>`;
        input.value = '';
        body.scrollTop = body.scrollHeight;
        setTimeout(() => {
            body.innerHTML += `<div class="bot-msg">Thank you for messaging! We'll reply shortly. Join our WhatsApp group for faster support.</div>`;
            body.scrollTop = body.scrollHeight;
        }, 1200);
    }
    document.getElementById('chatInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
