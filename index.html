<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yashni Creations | Ultra-Premium Luxury Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>

    <style>
        :root { 
            --green: #133D35; 
            --gold: #C5A059; 
            --white: #ffffff; 
            --cream: #FCF9F2; 
            --light-grey: #f5f5f5;
        }

        /* Enable smooth scroll across the body */
        html { scroll-behavior: smooth; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* LUXURY CUSTOM SCROLLBAR */
        @media (min-width: 900px) {
            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-track { background: var(--cream); }
            ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--green); }
        }

        /* CUSTOM GOLD CURSOR */
        @media (hover: hover) and (pointer: fine) {
            body { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"><circle cx="8" cy="8" r="4" fill="%23C5A059"/></svg>'), auto; }
            a, button, .card, .wishlist-btn { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"><circle cx="12" cy="12" r="10" fill="none" stroke="%23133D35" stroke-width="2"/></svg>'), pointer !important; }
        }

        body { 
            background-color: var(--white); 
            color: var(--green); 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Scroll locked until preloader finishes */
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--white); z-index: 100000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
        }
        .preloader-brand { text-align: center; }
        
        /* Premium Text Logo for Preloader */
        .preloader-text-logo {
            font-family: 'Playfair Display', serif; font-size: 32px; color: var(--green); letter-spacing: 2px;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .preloader-text-logo .p { position: relative; display: inline-block; overflow: hidden;}
        .preloader-text-logo span { font-family: 'Montserrat', sans-serif; font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: 400; letter-spacing: 5px; margin-top: 5px; display: block; }
        
        .logo-wrapper::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(197,160,89,0) 0%, rgba(197,160,89,0.3) 50%, rgba(197,160,89,0) 100%);
            transform: skewX(-25deg); animation: shine-sweep 6s infinite ease-out;
        }
        @keyframes shine-sweep { 0% { left: -150%; } 20% { left: 200%; } 100% { left: 200%; } }

        .site-content { opacity: 0; transform: translateY(20px); transition: opacity 1s cubic-bezier(0.23, 1, 0.32, 1), transform 1s cubic-bezier(0.23, 1, 0.32, 1); }
        .site-content.loaded { opacity: 1; transform: translateY(0); }

        /* --- HEADER --- */
        header {
            background: var(--green); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        header .nav-links { display: flex; gap: 20px; flex: 1; align-items: center;}
        header .nav-links.right { justify-content: flex-end; }
        header a { text-decoration: none; color: var(--white); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);}
        header a:hover { color: var(--gold); }

        header .header-wa-btn { background: #25D366; color: white !important; padding: 8px 15px; border-radius: 20px; font-size: 11px; }
        header .header-wa-btn:hover { background: #128C7E; color: white !important; }

        /* Premium Text Logo for Header */
        header .center-brand { text-align: center; flex: 1; display: flex; justify-content: center; align-items: center; }
        header .logo-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; overflow: hidden; padding: 2px 5px; gap: 2px;}
        header .logo-wrapper p { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--white); letter-spacing: 1px;}
        header .logo-wrapper span { font-family: 'Montserrat', sans-serif; font-size: 10px; color: var(--white); text-transform: uppercase; font-weight: 400; letter-spacing: 4px; display: block; opacity: 0.8; }
        
        /* Subtler shine for header logo */
        header .logo-wrapper::after { background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%); animation: shine-sweep 12s infinite ease-out; }

        /* --- MASONRY GRID --- */
        .lookbook-container { max-width: 1600px; margin: 40px auto; padding: 0 15px; column-count: 5; column-gap: 15px; transition: column-count 0.3s; }
        
        .card { 
            break-inside: avoid; margin-bottom: 15px; position: relative; 
            border-radius: 4px; overflow: hidden; background: var(--light-grey);
            border: 1px solid rgba(197, 160, 89, 0.1);
        }
        
        .img-box { position: relative; overflow: hidden; display: block; width: 100%; }
        .img-box img { width: 100%; display: block; transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1); }
        .card:hover img { transform: scale(1.05); }

        .wishlist-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9); width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; color: #ccc; z-index: 2; transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); }
        .wishlist-btn:hover { color: #ff4757; transform: scale(1.1); }
        
        /* Premium Card Overlay & Description Styling */
        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px 15px;
            background: rgba(19, 61, 53, 0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; flex-direction: column; gap: 8px; 
            opacity: 0; transition: opacity 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @media (hover: hover) { .card:hover .card-overlay { opacity: 1; } }
        @media (hover: none) { .card-overlay { opacity: 1; background: linear-gradient(to top, rgba(19, 61, 53, 0.95), rgba(19, 61, 53, 0.4), transparent); backdrop-filter: none; } }
        
        .product-title { color: var(--white); font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic; font-weight: 600; }
        
        .product-desc { 
            color: rgba(255, 255, 255, 0.85); font-size: 11px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 5px; letter-spacing: 0.5px;
        }

        .price-tag { color: var(--gold); font-weight: 700; font-size: 15px; }
        .buy-now { align-self: flex-start; background: var(--gold); color: var(--white); padding: 5px 15px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; text-decoration: none; margin-top: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}

        /* --- RESTORED FOOTER --- */
        footer { 
            background: var(--green); color: var(--white); padding: 80px 20px 40px; text-align: center; border-top: 4px solid var(--gold); margin-top: 60px;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
        }
        footer h2 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 25px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; }
        .contact-details p { font-size: 15px; margin-bottom: 15px; font-weight: 500; color: #EEE; }
        
        .social-buttons { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 35px; }
        .social-btn { padding: 12px 25px; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 12px; border-radius: 30px; transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .social-btn.whatsapp { background: #25D366; color: white; border: 2px solid transparent; }
        .social-btn.whatsapp:hover { background: white; color: #25D366; border-color: #25D366; }
        .social-btn.instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; border: 2px solid transparent; }
        .social-btn.instagram:hover { border-color: #bc1888; color: #bc1888; background: white;}

        .developer-credit { margin-top: 60px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: #ccc; letter-spacing: 1.5px; text-transform: uppercase; }
        .developer-credit a { color: var(--gold); text-decoration: none; font-weight: 600; transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);}
        .developer-credit a:hover { color: var(--white); text-shadow: 0 0 8px rgba(197, 160, 89, 0.6); }

        /* --- RESTORED CHATBOT & FLOATING BTN --- */
        .floating-wa { position: fixed; bottom: 30px; left: 30px; z-index: 9999; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; text-decoration: none; box-shadow: 0 5px 20px rgba(0,0,0,0.4); border: 2px solid white; transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); }
        .floating-wa:hover { transform: scale(1.1) translateY(-5px); }

        /* MOBILE RESPONSIVE REFINE */
        @media (max-width: 1200px) { .lookbook-container { column-count: 4; } }
        @media (max-width: 900px) { .lookbook-container { column-count: 3; } }
        @media (max-width: 600px) { 
            .lookbook-container { column-count: 2; column-gap: 8px; padding: 0 8px; margin: 20px auto;}
            .card { margin-bottom: 8px; border-radius: 4px;}
            header { padding: 10px; } .nav-links { gap: 10px; } header a { font-size: 10px; margin-left: 0;}
            .header-wa-btn { padding: 6px 10px; font-size: 9px; } .logo-img { height: 45px; } .logo-wrapper { padding: 2px 5px; }
            header .logo-wrapper p { font-size: 18px;}
            header .logo-wrapper span { font-size: 8px; letter-spacing: 2px;}
            .floating-wa { width: 50px; height: 50px; font-size: 24px; bottom: 15px; left: 15px; }
            .card-overlay { padding: 15px 10px; gap: 4px;}
            .product-title { font-size: 14px; } .product-desc { font-size: 10px; } .price-tag { font-size: 13px; } .buy-now { padding: 4px 10px; font-size: 9px; } .wishlist-btn { width: 25px; height: 25px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="preloader-brand">
            <div class="logo-wrapper preloader-text-logo">
                <p class="p">Yashni</p>
                <span>Creations</span>
            </div>
        </div>
    </div>

    <div class="site-content" id="mainSite">
        
        <header id="main-header">
            <div class="nav-links">
                <a href="#">Shop</a>
                <a href="#">New</a>
            </div>
            
            <div class="center-brand">
                <div class="logo-wrapper">
                    <p>Yashni</p>
                    <span>Creations</span>
                </div>
            </div>
            
            <div class="nav-links right">
                <a href="complaint.html" style="color: #ff4757; font-weight: 600;">Support</a>
                <a href="https://wa.me/919779997768" class="header-wa-btn" target="_blank">WhatsApp</a>
            </div>
        </header>

        <div class="lookbook-container" id="grid">
            <p style="text-align: center; width: 100%; color: var(--gold); padding: 50px; font-weight: bold;">Loading The Collection...</p>
        </div>

        <footer id="contact-footer">
            <h2>Yashni Creations</h2>
            <div class="contact-details">
                <p><strong>Email:</strong> ishaniahuja.123@gmail.com</p>
                <p><strong>Call / Message:</strong> +91 97799 97768 &nbsp;|&nbsp; +91 78890 71347</p>
            </div>
            <div class="social-buttons">
                <a href="https://wa.me/919779997768" class="social-btn whatsapp" target="_blank">WhatsApp Group</a>
                <a href="#" class="social-btn instagram" target="_blank">Instagram</a>
            </div>
            
            <div class="developer-credit">
                Designed & Developed by <a href="https://skywebsolutions.in/" target="_blank">SkyWeb Solutions</a>
            </div>
        </footer>

        <a href="https://wa.me/919779997768" class="floating-wa" target="_blank" title="Join WhatsApp Group">💬</a>
    </div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // PRELOADER LOGIC
    window.addEventListener('load', function() {
        setTimeout(function() {
            var preloader = document.getElementById('preloader');
            var mainSite = document.getElementById('mainSite');
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            document.body.style.overflow = 'auto';
            mainSite.classList.add('loaded');
        }, 1500); 
    });

    // CONTENTFUL API CONNECTION
    const SPACE_ID = 'l2ejwf7j6w9f'; 
    const ACCESS_TOKEN = 'Etivt-wjn21NJojQbh8TOPUBKbcNlwIEhgINXHQQLdE';

    const client = contentful.createClient({
        space: SPACE_ID,
        accessToken: ACCESS_TOKEN
    });

    client.getEntries({ content_type: 'product' }) 
        .then((response) => {
            const products = response.items;
            const grid = document.getElementById('grid');

            grid.innerHTML = products.map((prod, index) => {
                const title = prod.fields.title || 'Exclusive Outfit'; 
                const desc = prod.fields.description || ''; 
                const price = prod.fields.price || '₹0';
                const buyLink = prod.fields.buyLink || '#';
                
                let imageUrl = 'https://placehold.co/400x600/FCF9F2/133D35?text=No+Image';
                if(prod.fields.image && prod.fields.image.fields.file) {
                    imageUrl = 'https:' + prod.fields.image.fields.file.url;
                }

                const descHtml = desc ? `<div class="product-desc">${desc}</div>` : '';

                return `
                <div class="card" data-aos="fade-up" data-aos-offset="30" data-aos-delay="${(index % 5) * 50}">
                    <div class="wishlist-btn">❤</div>
                    <div class="img-box">
                        <img src="${imageUrl}" alt="${title}">
                    </div>
                    <div class="card-overlay">
                        <div class="product-title">${title}</div>
                        ${descHtml}
                        <div class="price-tag">${price}</div>
                        <a href="${buyLink}" target="_blank" class="buy-now">Buy Now</a>
                    </div>
                </div>
                `;
            }).join('');

            AOS.init({ once: true, offset: 50, easing: 'cubic-bezier(0.23, 1, 0.32, 1)', duration: 800 });
        })
        .catch(console.error);
</script>
</body>
</html>
