<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yashni Creations | Ultra-Premium Luxury Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>

    <style>
        :root { 
            --green: #133D35; 
            --gold: #C5A059; 
            --white: #ffffff; 
            --cream: #FCF9F2; 
            --light-grey: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @media (min-width: 900px) {
            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-track { background: var(--cream); }
            ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        }

        body { 
            background-color: var(--white); 
            color: var(--green); 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; 
        }

        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--white); z-index: 100000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
        }
        .preloader-brand { animation: pulseGlow 2s infinite alternate ease-in-out; text-align: center; }
        .preloader-brand img { height: 100px; width: auto; object-fit: contain; }
        .preloader-text { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); letter-spacing: 2px; margin-top: 10px; }
        
        @keyframes pulseGlow {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.4)); }
        }

        .site-content { opacity: 0; transform: translateY(20px); transition: opacity 1s ease-out, transform 1s ease-out; }
        .site-content.loaded { opacity: 1; transform: translateY(0); }

        header {
            background: var(--green); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        header a { text-decoration: none; color: var(--white); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;}

        .center-brand { text-align: center; flex: 1; display: flex; justify-content: center; align-items: center; }
        .logo-wrapper { position: relative; display: inline-block; overflow: hidden; border-radius: 4px; background: white; padding: 2px 10px; }
        .logo-img { height: 60px; width: auto; display: block; }
        
        .logo-wrapper::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shine-sweep 4s infinite;
        }
        @keyframes shine-sweep { 0% { left: -150%; } 20% { left: 200%; } 100% { left: 200%; } }

        .lookbook-container { max-width: 1600px; margin: 20px auto; padding: 0 15px; column-count: 5; column-gap: 15px; }
        
        .card { 
            break-inside: avoid; margin-bottom: 15px; position: relative; 
            border-radius: 4px; overflow: hidden; background: var(--light-grey);
            border: 1px solid rgba(197, 160, 89, 0.1);
        }
        .img-box img { width: 100%; display: block; transition: transform 0.8s ease; }
        .card:hover img { transform: scale(1.05); }
        
        /* CARD OVERLAY & NEW DESCRIPTION STYLING */
        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 15px;
            background: rgba(19, 61, 53, 0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; flex-direction: column; gap: 5px; /* Reduced gap for compact look */
            opacity: 0; transition: opacity 0.5s ease;
        }
        @media (hover: hover) { .card:hover .card-overlay { opacity: 1; } }
        @media (hover: none) { .card-overlay { opacity: 1; background: linear-gradient(to top, rgba(19, 61, 53, 0.95), rgba(19, 61, 53, 0.4), transparent); backdrop-filter: none; } }
        
        .product-title { color: var(--white); font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic; font-weight: 600; }
        
        /* Premium Description CSS */
        .product-desc { 
            color: rgba(255, 255, 255, 0.85); 
            font-size: 11px; 
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 2 line limit */
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .price-tag { color: var(--gold); font-weight: 700; font-size: 15px; }
        
        .buy-now { align-self: flex-start; background: var(--gold); color: var(--white); padding: 5px 15px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; text-decoration: none; margin-top: 5px; }

        footer { 
            background: var(--green); color: var(--white); padding: 60px 20px 30px; text-align: center; border-top: 4px solid var(--gold); margin-top: 40px;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
        }
        .developer-credit { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: #ccc; }
        .developer-credit a { color: var(--gold); text-decoration: none; font-weight: 600; }

        .floating-wa { position: fixed; bottom: 30px; left: 30px; z-index: 9999; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; text-decoration: none; box-shadow: 0 5px 20px rgba(0,0,0,0.4); border: 2px solid white; }

        @media (max-width: 600px) { 
            .lookbook-container { column-count: 2; column-gap: 8px; } 
            .product-title { font-size: 14px; } 
            .product-desc { font-size: 10px; }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="preloader-brand">
            <img src="Untitled.jpg" alt="Logo">
            <div class="preloader-text">Yashni Creations</div>
        </div>
    </div>

    <div class="site-content" id="mainSite">
        <header>
            <div class="nav-links"><a href="#">Shop</a></div>
            <div class="center-brand">
                <div class="logo-wrapper"><img src="Untitled.jpg" class="logo-img" alt="Logo"></div>
            </div>
            <div class="nav-links right"><a href="complaint.html" style="color: #ff4757;">Support</a></div>
        </header>

        <div class="lookbook-container" id="grid">
            <p style="text-align: center; width: 100%; color: var(--gold); padding: 50px;">Loading Collection...</p>
        </div>

        <footer>
            <h2>Yashni Creations</h2>
            <p>ishaniahuja.123@gmail.com | +91 97799 97768</p>
            <div class="developer-credit">
                Designed & Developed by <a href="https://skywebsolutions.in/" target="_blank">SkyWeb Solutions</a>
            </div>
        </footer>

        <a href="https://wa.me/919779997768" class="floating-wa" target="_blank">💬</a>
    </div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // PRELOADER
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.getElementById('preloader').style.opacity = '0';
            document.getElementById('preloader').style.visibility = 'hidden';
            document.body.style.overflow = 'auto';
            document.getElementById('mainSite').classList.add('loaded');
        }, 1500); 
    });

    // CONTENTFUL DATA FETCHING
    const SPACE_ID = 'l2ejwf7j6w9f'; 
    const ACCESS_TOKEN = 'Etivt-wjn21NJojQbh8TOPUBKbcNlwIEhgINXHQQLdE';

    const client = contentful.createClient({
        space: SPACE_ID,
        accessToken: ACCESS_TOKEN
    });

    client.getEntries({ content_type: 'product' }) 
        .then((response) => {
            const products = response.items;
            const grid = document.getElementById('grid');

            grid.innerHTML = products.map((prod, index) => {
                const title = prod.fields.title || 'Exclusive Outfit'; 
                const desc = prod.fields.description || ''; // Description fetch ho rahi hai
                const price = prod.fields.price || '₹0';
                const buyLink = prod.fields.buyLink || '#';
                
                let imageUrl = 'https://placehold.co/400x600/FCF9F2/133D35?text=No+Image';
                if(prod.fields.image && prod.fields.image.fields.file) {
                    imageUrl = 'https:' + prod.fields.image.fields.file.url;
                }

                // Agar description khali hai toh dabba hide ho jayega
                const descHtml = desc ? `<div class="product-desc">${desc}</div>` : '';

                return `
                <div class="card" data-aos="fade-up" data-aos-delay="${(index % 5) * 50}">
                    <div class="img-box">
                        <img src="${imageUrl}" alt="${title}">
                    </div>
                    <div class="card-overlay">
                        <div class="product-title">${title}</div>
                        ${descHtml}
                        <div class="price-tag">${price}</div>
                        <a href="${buyLink}" target="_blank" class="buy-now">Buy Now</a>
                    </div>
                </div>
                `;
            }).join('');

            AOS.init({ once: true, duration: 800 });
        })
        .catch(console.error);
</script>
</body>
</html>
