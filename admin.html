<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashni Creations | Admin Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/contentful-management@10.46.0/dist/contentful-management.browser.min.js"></script>

    <style>
        :root { 
            --green: #09261d; --gold: #D4AF37; --cream: #FAF7F2; 
            --white: #ffffff; --red: #d3145a;
        }
        body { 
            background-color: var(--cream); color: var(--green); 
            font-family: 'Montserrat', sans-serif; display: flex;
            flex-direction: column; align-items: center; padding: 40px 20px;
            min-height: 100vh; margin: 0; box-sizing: border-box;
        }
        
        /* --- LOGIN SCREEN OVERLAY --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(9, 38, 29, 0.95); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: var(--white); padding: 40px; border-radius: 12px;
            width: 100%; max-width: 400px; text-align: center;
        }
        .login-box h2 { font-family: 'Playfair Display', serif; color: var(--green); margin-bottom: 20px; }
        .login-box p { font-size: 12px; color: #666; margin-bottom: 20px; line-height: 1.5; }
        
        /* Main Dashboard (Hidden by default) */
        #mainDashboard { display: none; width: 100%; display: flex; flex-direction: column; align-items: center; }

        .admin-card {
            background: var(--white); padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 550px;
            border: 1px solid rgba(9, 38, 29, 0.1); margin-bottom: 30px;
        }
        .admin-header { text-align: center; margin-bottom: 25px; position: relative; }
        .admin-header h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 24px; margin-bottom: 5px; }
        .admin-header h2 { font-family: 'Playfair Display', serif; color: var(--green); font-size: 20px; margin-bottom: 5px; }
        .admin-header p { font-size: 12px; color: #666; }
        
        .logout-btn {
            position: absolute; top: 0; right: 0; font-size: 10px; padding: 5px 10px;
            background: #eee; border: none; border-radius: 4px; cursor: pointer; color: #333;
        }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
        .form-group input {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;
            font-family: 'Montserrat', sans-serif; font-size: 13px; box-sizing: border-box; transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: var(--gold); }
        .submit-btn {
            background: var(--green); color: var(--white); width: 100%; padding: 14px;
            border: none; border-radius: 6px; font-size: 13px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: all 0.3s ease;
        }
        .submit-btn:hover { background: var(--gold); color: var(--green); }
        .submit-btn:disabled { background: #ccc; color: #666; cursor: not-allowed; }
        #status-message { margin-top: 15px; text-align: center; font-size: 13px; font-weight: 500; display: none; }
        .success { color: #25D366; }
        .error { color: var(--red); }
        .product-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #eee; text-align: left;
        }
        .product-item:last-child { border-bottom: none; }
        .product-info { display: flex; flex-direction: column; gap: 4px; }
        .product-name { font-size: 13px; font-weight: 600; color: var(--green); }
        .product-price { font-size: 11px; color: #888; }
        .delete-btn {
            background: #fff; color: var(--red); border: 1px solid var(--red);
            padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .delete-btn:hover { background: var(--red); color: white; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2>Admin Login</h2>
            <p>Please enter your Secret Key to access the dashboard. This keeps your website secure.</p>
            <div class="form-group">
                <input type="password" id="secretKeyInput" placeholder="Enter Secret Key (CMA Token)">
            </div>
            <button class="submit-btn" onclick="saveTokenAndLogin()">Unlock Dashboard</button>
        </div>
    </div>

    <div id="mainDashboard" style="display: none;">
        <div class="admin-card">
            <div class="admin-header">
                <h1>Yashni Creations</h1>
                <p>Upload New Product to Website</p>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <form id="uploadForm" onsubmit="return false;"> 
                <div class="form-group">
                    <label for="productTitle">Product Name</label>
                    <input type="text" id="productTitle" placeholder="e.g. Royal Emerald Lehenga" required>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price (in ₹)</label>
                    <input type="text" id="productPrice" placeholder="e.g. ₹4,500" required>
                </div>
                <div class="form-group">
                    <label for="productImage">Product Image (File)</label>
                    <input type="file" id="productImage" accept="image/*" required>
                </div>
                <button type="button" id="submitBtn" class="submit-btn" onclick="startUpload()">Upload Product</button>
                <div id="status-message"></div>
            </form>
        </div>

        <div class="admin-card">
            <div class="admin-header">
                <h2>Manage Live Products</h2>
                <p>Delete products you no longer want to sell</p>
            </div>
            <div id="productList">
                <p style="text-align: center; font-size: 12px; color: #888;">Loading your products...</p>
            </div>
        </div>
    </div>

<script>
    // Public IDs (Safe for Git)
    const SPACE_ID = '7thsqvngkcgx'; 
    const ENVIRONMENT_ID = 'main'; 
    let client;
    let CMA_TOKEN = '';

    // --- AUTHENTICATION LOGIC ---
    function checkLogin() {
        CMA_TOKEN = localStorage.getItem('yashni_admin_token');
        if (CMA_TOKEN) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'flex';
            initContentful();
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('mainDashboard').style.display = 'none';
        }
    }

    function saveTokenAndLogin() {
        const inputVal = document.getElementById('secretKeyInput').value.trim();
        if (!inputVal) {
            alert("Please enter the secret key!");
            return;
        }
        localStorage.setItem('yashni_admin_token', inputVal);
        checkLogin();
    }

    function logout() {
        localStorage.removeItem('yashni_admin_token');
        location.reload(); // Refresh to show login screen
    }

    // --- INITIALIZE CONTENTFUL ---
    function initContentful() {
        if (typeof contentfulManagement === 'undefined') {
            document.getElementById('productList').innerHTML = '<p style="color:red; text-align:center;">Browser is blocking the scripts! Disable Ad-blocker or run on a live server.</p>';
            return;
        }
        try {
            client = contentfulManagement.createClient({ accessToken: CMA_TOKEN });
            fetchAndDisplayProducts();
        } catch (e) {
            alert("Invalid Token. Please check your Secret Key.");
            logout();
        }
    }

    // --- CORE LOGIC ---
    async function getDefaultLocale(environment) {
        const locales = await environment.getLocales();
        const defaultLocale = locales.items.find(l => l.default);
        return defaultLocale ? defaultLocale.code : 'en-US';
    }

    async function fetchAndDisplayProducts() {
        const productListDiv = document.getElementById('productList');
        try {
            const space = await client.getSpace(SPACE_ID);
            const environment = await space.getEnvironment(ENVIRONMENT_ID);
            const entries = await environment.getEntries({ content_type: 'product' });

            if(entries.items.length === 0) {
                productListDiv.innerHTML = '<p style="text-align:center; font-size:12px; color:#888;">No products found on the website.</p>';
                return;
            }

            let html = '';
            entries.items.forEach(entry => {
                const locale = Object.keys(entry.fields.title || {})[0] || 'en-US';
                const title = entry.fields.title ? entry.fields.title[locale] : 'Unnamed Product';
                const price = entry.fields.price ? entry.fields.price[locale] : 'No Price';
                const entryId = entry.sys.id;
                const isPublished = !!entry.sys.publishedVersion; 

                html += `
                    <div class="product-item" id="item-${entryId}">
                        <div class="product-info">
                            <span class="product-name">${title} ${!isPublished ? '(Draft)' : ''}</span>
                            <span class="product-price">${price}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteProduct('${entryId}')">Delete</button>
                    </div>
                `;
            });
            productListDiv.innerHTML = html;
        } catch (error) {
            console.error(error);
            if (error.message.includes("401")) {
                alert("Unauthorized! The secret key is incorrect.");
                logout();
            } else {
                productListDiv.innerHTML = `<p style="text-align:center; font-size:12px; color:red;">Failed to load products. ${error.message}</p>`;
            }
        }
    }

    async function deleteProduct(entryId) {
        if (!confirm("Are you sure you want to delete this product?")) return;
        const btn = document.querySelector(`#item-${entryId} .delete-btn`);
        btn.innerText = "Deleting..."; btn.disabled = true;

        try {
            const space = await client.getSpace(SPACE_ID);
            const environment = await space.getEnvironment(ENVIRONMENT_ID);
            const entry = await environment.getEntry(entryId);
            
            if (entry.sys.publishedVersion) await entry.unpublish();
            await entry.delete();
            
            document.getElementById(`item-${entryId}`).remove();
            if (document.querySelectorAll('.product-item').length === 0) {
                document.getElementById('productList').innerHTML = '<p style="text-align:center; font-size:12px; color:#888;">No products found on the website.</p>';
            }
        } catch (error) {
            alert("Error deleting product.");
            btn.innerText = "Delete"; btn.disabled = false;
        }
    }

    async function startUpload() {
        const btn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('status-message');
        const title = document.getElementById('productTitle').value;
        const price = document.getElementById('productPrice').value;
        const fileInput = document.getElementById('productImage').files[0];

        if(!title || !price || !fileInput) { alert("Fill all fields!"); return; }

        btn.disabled = true;
        btn.innerText = 'Uploading... Please wait';
        statusMsg.style.display = 'block';
        statusMsg.innerText = 'Connecting...';
        statusMsg.className = '';

        try {
            const space = await client.getSpace(SPACE_ID);
            const environment = await space.getEnvironment(ENVIRONMENT_ID);
            const localeCode = await getDefaultLocale(environment);

            statusMsg.innerText = 'Uploading Image...';
            const asset = await environment.createAssetFromFiles({
                fields: {
                    title: { [localeCode]: title + ' Image' },
                    file: {
                        [localeCode]: {
                            contentType: fileInput.type,
                            fileName: fileInput.name,
                            file: fileInput
                        }
                    }
                }
            });

            statusMsg.innerText = 'Processing Image...';
            let processedAsset = await asset.processForAllLocales();
            processedAsset = await processedAsset.publish(); 

            statusMsg.innerText = 'Creating Product...';
            const entry = await environment.createEntry('product', { 
                fields: {
                    title: { [localeCode]: title },
                    price: { [localeCode]: price },
                    image: { [localeCode]: { sys: { type: 'Link', linkType: 'Asset', id: processedAsset.sys.id } } }
                }
            });

            await entry.publish();

            statusMsg.innerText = '✅ Product successfully added!';
            statusMsg.className = 'success';
            btn.innerText = 'Upload Product';
            btn.disabled = false;
            document.getElementById('uploadForm').reset();
            
            fetchAndDisplayProducts();

        } catch (error) {
            alert("Upload Failed! Error: " + error.message);
            statusMsg.innerText = '❌ Error uploading.';
            statusMsg.className = 'error';
            btn.innerText = 'Try Again';
            btn.disabled = false;
        }
    }

    // Page Load Setup
    window.onload = checkLogin;
</script>
</body>
</html>
