<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Yashni Creations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
    <style>
        :root {
            --green: #09261d;
            --gold: #d4af37;
            --cream: #faf7f2;
            --ivory: #fffdf9;
            --ink: #17221d;
            --muted: #6f776f;
            --line: rgba(9, 38, 29, 0.12);
            --red: #c81e55;
            --shadow: 0 18px 45px rgba(9, 38, 29, 0.12);
        }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--cream); color: var(--ink); font-family: "Montserrat", Arial, sans-serif; }
        a { color: inherit; text-decoration: none; }
        button { font: inherit; }
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 12px clamp(16px, 5vw, 72px);
            background: rgba(250, 247, 242, 0.92);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(14px);
        }
        header a { font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
        .logo-img { display: block; height: 62px; width: auto; mix-blend-mode: multiply; }
        .cart-wrap { display: flex; justify-content: flex-end; }
        .cart-btn {
            position: relative;
            display: inline-grid;
            place-items: center;
            width: 40px;
            height: 40px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--ivory);
            font-size: 18px;
        }
        .cart-badge {
            position: absolute;
            top: -6px;
            right: -7px;
            min-width: 19px;
            height: 19px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: var(--red);
            color: white;
            font-size: 10px;
            font-weight: 800;
        }
        .product-container {
            max-width: 1180px;
            margin: 46px auto 72px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 0.85fr);
            gap: clamp(28px, 5vw, 64px);
            align-items: start;
        }
        .product-image {
            background: var(--ivory);
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .product-image img { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; display: block; }
        .product-details {
            background: var(--ivory);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: clamp(22px, 4vw, 38px);
        }
        .brand-name { margin: 0 0 10px; color: var(--gold); font-size: 12px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; }
        h1 { margin: 0 0 18px; color: var(--green); font-family: "Playfair Display", Georgia, serif; font-size: clamp(32px, 5vw, 52px); line-height: 1.05; }
        .price-section { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding-bottom: 24px; margin-bottom: 24px; border-bottom: 1px solid var(--line); }
        .current-price { font-size: 28px; color: var(--green); font-weight: 800; }
        .old-price { font-size: 16px; color: var(--muted); text-decoration: line-through; }
        .discount { color: var(--red); background: #fde9ef; padding: 6px 10px; border-radius: 4px; font-size: 12px; font-weight: 800; }
        .description { color: #4c5650; font-size: 15px; line-height: 1.8; white-space: pre-wrap; }
        .btn-group { display: flex; gap: 12px; margin-top: 30px; }
        .action-btn {
            flex: 1;
            min-height: 50px;
            border: 2px solid var(--green);
            border-radius: 4px;
            background: var(--green);
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .action-btn.added { background: var(--gold); color: var(--green); border-color: var(--gold); }
        .state-message {
            grid-column: 1 / -1;
            min-height: 260px;
            display: grid;
            place-items: center;
            text-align: center;
            background: var(--ivory);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 28px;
            color: var(--muted);
        }
        footer { background: var(--green); color: var(--cream); text-align: center; padding: 42px 20px; }
        footer h2 { margin: 0 0 14px; color: var(--gold); font-family: "Playfair Display", Georgia, serif; }
        .developer-credit { margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.12); color: rgba(250,247,242,0.6); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
        .developer-credit a { color: var(--gold); }
        @media (max-width: 820px) {
            header { padding: 10px 14px; }
            .logo-img { height: 50px; }
            .product-container { grid-template-columns: 1fr; margin-top: 22px; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">&#8592; Back</a>
        <a href="index.html" aria-label="Yashni Creations Home"><img src="Untitled.jpg" class="logo-img" alt="Yashni Creations"></a>
        <div class="cart-wrap">
            <a href="cart.html" class="cart-btn" aria-label="Cart">
                <span aria-hidden="true">&#128722;</span>
                <span class="cart-badge" id="cartBadge">0</span>
            </a>
        </div>
    </header>

    <main class="product-container" id="productDetails">
        <div class="state-message">Loading product...</div>
    </main>

    <footer>
        <h2>Yashni Creations</h2>
        <div class="developer-credit">
            Designed By <a href="https://skywebsolutions.in/" target="_blank" rel="noreferrer">SkyWeb Solutions</a> | <a href="admin.html">Admin Portal &#128274;</a>
        </div>
    </footer>

    <script>
        const SPACE_ID = "7thsqvngkcgx";
        const ACCESS_TOKEN = "G3rUWejxwN57qQK2x6RoStstEBb1DQoSKTRavfwHGgg";
        const container = document.getElementById("productDetails");

        function getCart() {
            try { return JSON.parse(localStorage.getItem("yashni_cart")) || []; }
            catch { return []; }
        }
        function updateCartBadge() {
            document.getElementById("cartBadge").textContent = getCart().reduce((sum, item) => sum + (item.quantity || 1), 0);
        }
        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
            })[char]);
        }
        function moneyNumber(value) {
            const parsed = parseInt(String(value).replace(/[^0-9]/g, ""), 10);
            return Number.isFinite(parsed) ? parsed : 0;
        }
        function oldPriceFor(price) {
            const base = moneyNumber(price);
            return base ? "Rs. " + (base + 1200).toLocaleString("en-IN") : "";
        }
        function addToCart(button) {
            if (button.classList.contains("added")) {
                window.location.href = "cart.html";
                return;
            }
            const cart = getCart();
            cart.push({
                id: button.dataset.id,
                title: button.dataset.title,
                price: button.dataset.price,
                image: button.dataset.img,
                quantity: 1
            });
            localStorage.setItem("yashni_cart", JSON.stringify(cart));
            updateCartBadge();
            button.textContent = "Go to Cart";
            button.classList.add("added");
        }

        updateCartBadge();

        const prodId = new URLSearchParams(window.location.search).get("id");
        if (!prodId) {
            container.innerHTML = '<div class="state-message">No product selected. <a href="index.html">Return to collection</a>.</div>';
        } else if (typeof contentful === "undefined") {
            container.innerHTML = '<div class="state-message">Could not load product details. Please check your internet connection and refresh.</div>';
        } else {
            contentful.createClient({ space: SPACE_ID, accessToken: ACCESS_TOKEN })
                .getEntry(prodId)
                .then((prod) => {
                    const title = prod.fields.title || "Exclusive Product";
                    const price = prod.fields.price || "Rs. 0";
                    const desc = prod.fields.description || "Premium quality ethnic wear curated for your style. Message us on WhatsApp for sizing, availability, and custom assistance.";
                    const imageUrl = prod.fields.image && prod.fields.image.fields.file
                        ? "https:" + prod.fields.image.fields.file.url
                        : "https://placehold.co/600x800/f5f0e8/09261d?text=Yashni";
                    const alreadyInCart = getCart().some((item) => item.id === prodId);

                    container.innerHTML = `
                        <div class="product-image">
                            <img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}">
                        </div>
                        <section class="product-details">
                            <p class="brand-name">Yashni Creations Exclusive</p>
                            <h1>${escapeHtml(title)}</h1>
                            <div class="price-section">
                                <span class="current-price">${escapeHtml(price)}</span>
                                <span class="old-price">${oldPriceFor(price)}</span>
                                <span class="discount">35% OFF</span>
                            </div>
                            <div class="description">${escapeHtml(desc)}</div>
                            <div class="btn-group">
                                <button class="action-btn ${alreadyInCart ? "added" : ""}" type="button" data-id="${escapeHtml(prodId)}" data-title="${escapeHtml(title)}" data-price="${escapeHtml(price)}" data-img="${escapeHtml(imageUrl)}">
                                    ${alreadyInCart ? "Go to Cart" : "Add to Cart"}
                                </button>
                            </div>
                        </section>
                    `;
                    document.querySelector(".action-btn").addEventListener("click", (event) => addToCart(event.currentTarget));
                })
                .catch(() => {
                    container.innerHTML = '<div class="state-message">Product not found. <a href="index.html">Return to collection</a>.</div>';
                });
        }
    </script>
</body>
</html>
