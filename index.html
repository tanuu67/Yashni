<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashni Creations | Premium Luxury Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* --- BRAND COLORS --- */
        :root { 
            --green: #133D35; 
            --gold: #C5A059; 
            --white: #ffffff; 
            --cream: #FCF9F2; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--green); 
            color: white; 
            font-family: 'Montserrat', sans-serif;
            /* Indian Texture Background */
            background-image: url('https://www.transparenttextures.com/patterns/p6.png'); 
        }

        /* --- STICKY HEADER --- */
        header {
            background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--gold); box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .nav-links { display: flex; gap: 20px; flex: 1; align-items: center;}
        .nav-links.right { justify-content: flex-end; }
        header a { text-decoration: none; color: var(--green); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;}
        header a:hover { color: var(--gold); }

        /* Header WhatsApp Button */
        .header-wa-btn {
            background: #25D366; color: white !important; padding: 8px 15px; border-radius: 20px; font-size: 11px;
        }
        .header-wa-btn:hover { background: #128C7E; color: white !important; }

        /* --- CENTER SHINING LOGO --- */
        .center-brand { text-align: center; flex: 1; display: flex; justify-content: center; align-items: center; }
        
        .logo-wrapper {
            position: relative; display: inline-block; overflow: hidden; border-radius: 4px;
            animation: floating 3s ease-in-out infinite;
        }
        .logo-img { height: 90px; width: auto; object-fit: contain; display: block; }
        
        /* Logo Light Reflection Effect */
        .logo-wrapper::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shine-sweep 4s infinite;
        }

        @keyframes shine-sweep { 0% { left: -150%; } 20% { left: 200%; } 100% { left: 200%; } }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* --- PURE IMAGE GRID (NO TEXT) --- */
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; column-count: 4; column-gap: 25px; }
        .card { break-inside: avoid; margin-bottom: 25px; border-radius: 6px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid rgba(197,160,89,0.2); }
        
        .img-box { position: relative; overflow: hidden; background: #1a1a1a; display: flex; }
        .img-box img { width: 100%; display: block; transition: transform 0.6s ease; }
        .card:hover img { transform: scale(1.08); }
        
        .order-btn { 
            position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.95); 
            color: var(--green); padding: 14px 0; text-align: center; text-decoration: none; font-weight: 700; border: 1px solid var(--gold);
            opacity: 0; transition: 0.4s; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
        }
        .card:hover .order-btn { bottom: 20px; opacity: 1; }
        .order-btn:hover { background: var(--green); color: white; }

        /* --- FOOTER --- */
        footer { background: white; color: var(--green); padding: 60px 20px; text-align: center; border-top: 4px solid var(--gold); margin-top: 40px; }
        footer h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase; }
        .contact-details p { font-size: 15px; margin-bottom: 10px; font-weight: 500; }
        .contact-details p strong { color: var(--gold); }
        
        .social-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .social-btn {
            padding: 12px 30px; text-decoration: none; font-weight: 600; text-transform: uppercase; 
            letter-spacing: 1px; font-size: 13px; border-radius: 30px; transition: 0.3s;
        }
        .whatsapp { background: #25D366; color: white; border: 2px solid #25D366; }
        .whatsapp:hover { background: white; color: #25D366; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; border: 2px solid transparent; }
        .instagram:hover { background: white; color: #cc2366; border-color: #cc2366; }

        /* --- SIDE FLOATING WHATSAPP --- */
        .floating-wa {
            position: fixed; bottom: 30px; left: 30px; z-index: 9999;
            background: #25D366; color: white; width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 32px; text-decoration: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); border: 2px solid white; transition: 0.3s;
        }
        .floating-wa:hover { transform: scale(1.1); }

        /* --- CHATBOT WIDGET --- */
        .chatbot-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .chat-btn {
            width: 65px; height: 65px; border-radius: 50%; background: var(--gold); color: var(--green);
            display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); border: 2px solid var(--white); transition: 0.3s;
        }
        .chat-btn:hover { transform: scale(1.1); }
        .chat-window {
            position: absolute; bottom: 80px; right: 0; width: 320px; background: white;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #eee;
            display: none; flex-direction: column; overflow: hidden; transform-origin: bottom right;
        }
        .chat-window.active { display: flex; }
        .chat-header { background: var(--green); color: white; padding: 15px; font-family: 'Playfair Display', serif; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
        .close-chat { cursor: pointer; font-family: sans-serif; font-size: 18px; }
        .chat-body { padding: 20px; height: 280px; overflow-y: auto; background: var(--cream); font-size: 13px; color: #444; }
        .bot-msg { background: white; padding: 12px; border-radius: 8px; border-bottom-left-radius: 0; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .chat-input { display: flex; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; padding: 15px; border: none; outline: none; font-family: inherit; }
        .chat-input button { padding: 0 20px; background: white; color: var(--gold); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Responsiveness */
        @media (max-width: 900px) { .container { column-count: 2; } header { flex-direction: column; gap: 15px; } .social-buttons { flex-direction: column; align-items: center; } }
        @media (max-width: 500px) { .container { column-count: 1; } }
    </style>
</head>
<body>

<header>
    <div class="nav-links">
        <a href="#">The Collection</a>
        <a href="#contact-footer">Contact</a>
    </div>
    
    <div class="center-brand">
        <div class="logo-wrapper">
            <img src="Untitled.jpg" class="logo-img" alt="Yashni Creations Logo">
        </div>
    </div>
    
    <div class="nav-links right">
        <a href="complaint.html" style="color: #D32F2F;">Complaints</a>
        <a href="https://wa.me/919779997768" class="header-wa-btn" target="_blank">WhatsApp Group</a>
    </div>
</header>

<div class="container" id="grid"></div>

<footer id="contact-footer">
    <h2>Contact Us</h2>
    <div class="contact-details">
        <p><strong>Email:</strong> ishaniahuja.123@gmail.com</p>
        <p><strong>Call / Message:</strong> +91 97799 97768 &nbsp;|&nbsp; +91 78890 71347</p>
    </div>
    <div class="social-buttons">
        <a href="https://wa.me/919779997768" class="social-btn whatsapp" target="_blank">WhatsApp Group</a>
        <a href="#" class="social-btn instagram" target="_blank">Follow on Instagram</a>
    </div>
</footer>

<a href="https://wa.me/919779997768" class="floating-wa" target="_blank" title="Join WhatsApp Group">
    💬
</a>

<div class="chatbot-container">
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <span>✨ Yashni Assistant</span>
            <span class="close-chat" onclick="toggleChat()">✖</span>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="bot-msg">Namaste! Welcome to Yashni Creations. 🙏</div>
            <div class="bot-msg">How can I help you find the perfect outfit today?</div>
        </div>
        <div class="chat-input">
            <input type="text" placeholder="Message..." id="chatInput">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <div class="chat-btn" onclick="toggleChat()">🤖</div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // Initialize Scroll Animations
    AOS.init();
    
    // Product Image Heights (For Masonry Grid Layout)
    const prods = [ {h: 550}, {h: 400}, {h: 600}, {h: 480}, {h: 520}, {h: 450}, {h: 650}, {h: 500} ];
    
    // Generate the Grid
    document.getElementById('grid').innerHTML = prods.map((x, index) => `
        <div class="card" data-aos="zoom-in" data-aos-delay="${index * 50}">
            <div class="img-box">
                <img src="https://placehold.co/400x${x.h}/133D35/C5A059?text=Yashni+Style" alt="Indian Wear">
                <a href="#contact-footer" class="order-btn">ORDER NOW</a>
            </div>
        </div>
    `).join('');

    // Chatbot Logic
    function toggleChat() { document.getElementById('chatWindow').classList.toggle('active'); }
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if(!msg) return;
        const body = document.getElementById('chatBody');
        
        // User Message
        body.innerHTML += `<div class="bot-msg" style="background: var(--gold); color: white; text-align: right; margin-left: 20px;">${msg}</div>`;
        input.value = '';
        body.scrollTop = body.scrollHeight;
        
        // Bot Reply
        setTimeout(() => {
            body.innerHTML += `<div class="bot-msg">Thank you! You can directly join our WhatsApp Group or message us at +91 97799 97768 for quick support.</div>`;
            body.scrollTop = body.scrollHeight;
        }, 1000);
    }
    document.getElementById('chatInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
